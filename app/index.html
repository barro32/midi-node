<!DOCTYPE html>
<html>

<head>
	<title>Midi Node</title>
	<meta charset="utf-8" />
	<link rel="stylesheet" type="text/css" href="static/styles.css">
</head>

<body>
	<section class="header">
		<h1 class="header__title">midi-node</h1>
		<span class="header__version tape">v0.1.0</span>
	</section>
	<section class="panel">
		<div class="transport">
			<button class="transport__start">Start</button>
			<button class="transport__stop">Stop</button>
			<button class="transport__clear">Clear</button>
			<label>
				Tempo <span class="transport__tempo-value">120</span>BPM
				<input class="transport__tempo" type="range" min="60" max="180" value="120" />
			</label>
		</div>
		<div class="synth">
			<label class="layer-toggle" title="Switch the grid between synth notes and drums">
				<span class="layer-toggle__text">Layer</span>
				<input class="layer-toggle__input" type="checkbox" />
				<span class="layer-toggle__track">
					<span class="layer-toggle__thumb"></span>
					<span class="layer-toggle__icon layer-toggle__icon--synth">♪</span>
					<span class="layer-toggle__icon layer-toggle__icon--drums">●</span>
				</span>
				<span class="layer-toggle__label">synth</span>
			</label>
			<label>
				Waveform
				<select class="synth__waveform">
					<option value="sine">sine</option>
					<option value="square">square</option>
					<option value="sawtooth">sawtooth</option>
					<option value="triangle">triangle</option>
				</select>
			</label>
			<label>
				Volume
				<input class="synth__volume" type="range" min="0" max="0.6" step="0.01" value="0.25" />
			</label>
		</div>
	</section>
	<div class="board"></div>
	<section class="help tape">
		Use the arrow keys to move, space/click to toggle the current layer, escape to clear that layer.
	</section>
	<section>
		<div class="controls">
			<button class="controls__up" data-key="ArrowUp">⬆</button>
			<button class="controls__left" data-key="ArrowLeft">⬅</button>
			<button class="controls__enter" data-key=" ">✖</button>
			<button class="controls__right" data-key="ArrowRight">➡</button>
			<button class="controls__down" data-key="ArrowDown">⬇</button>
		</div>
	</section>
</body>
<script type="text/javascript" src="static/bundle.js"></script>

</html>
